<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fortify SCA Helper</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    input[type=text] { width: 300px; }
    .result { margin-top: 1em; }
  </style>
</head>
<body>
  <h1>Fortify SCA Feature Search</h1>
  <input id="search" type="text" placeholder="Search features">
  <button onclick="search()">Search</button>
  <div id="results" class="result"></div>
  <button onclick="generate()">Generate Script</button>
  <pre id="script"></pre>
<script>
let selected = [];
function search() {
  const q = document.getElementById('search').value;
  fetch('/search?q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(data => {
      const div = document.getElementById('results');
      div.innerHTML = '';
      data.forEach(f => {
        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.value = f.name;
        chk.onchange = ev => {
          if(ev.target.checked) selected.push(ev.target.value);
          else selected = selected.filter(v => v !== ev.target.value);
        };
        div.appendChild(chk);
        const label = document.createElement('span');
        label.textContent = `${f.name} - ${f.description}`;
        div.appendChild(label);
        div.appendChild(document.createElement('br'));
      });
    });
}
function generate() {
  fetch('/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({features: selected})
  }).then(r => r.json())
    .then(data => {
      document.getElementById('script').textContent = data.script;
    });
}
</script>
</body>
</html>
